<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧞‍♀️ 지니의 타임머신</title>
<style>
  :root {
    --bg: #0d0d1a;
    --card: #16162a;
    --card2: #1e1e35;
    --accent: #7c3aed;
    --accent2: #a855f7;
    --accent3: #c084fc;
    --gold: #f59e0b;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --border: #2a2a4a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', 'Apple SD Gothic Neo', sans-serif; min-height: 100vh; }

  /* header */
  header {
    background: linear-gradient(135deg, #1a0533 0%, #0d0d1a 100%);
    border-bottom: 1px solid var(--border);
    padding: 20px 32px;
    display: flex; align-items: center; gap: 16px;
  }
  .logo { font-size: 2.4rem; filter: drop-shadow(0 0 12px #a855f7); }
  .logo-text h1 { font-size: 1.6rem; font-weight: 900; background: linear-gradient(90deg, #c084fc, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .logo-text p { font-size: 0.8rem; color: var(--muted); margin-top: 2px; }

  /* main */
  .wrap { max-width: 900px; margin: 0 auto; padding: 32px 16px; }

  /* search card */
  .search-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    margin-bottom: 28px;
    box-shadow: 0 8px 32px rgba(124,58,237,.15);
  }
  .search-card h2 { font-size: 0.85rem; color: var(--muted); margin-bottom: 18px; text-transform: uppercase; letter-spacing: 1px; }
  .input-group { display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
  .input-group input {
    flex: 1; min-width: 220px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 13px 18px;
    color: var(--text);
    font-size: 0.95rem;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  .input-group input:focus { border-color: var(--accent2); box-shadow: 0 0 0 3px rgba(168,85,247,.15); }
  .input-group input::placeholder { color: #444; }
  .btn {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff; border: none; border-radius: 12px;
    padding: 13px 26px; font-size: 0.95rem; font-weight: 700;
    cursor: pointer; transition: opacity .2s, transform .1s;
    white-space: nowrap; box-shadow: 0 4px 16px rgba(124,58,237,.4);
  }
  .btn:hover { opacity: .88; transform: translateY(-1px); }
  .btn:disabled { opacity: .4; cursor: not-allowed; transform: none; }

  /* status */
  .status { font-size: 0.82rem; min-height: 20px; margin-top: 6px; }
  .status.ok { color: #4ade80; }
  .status.err { color: #f87171; }
  .status.loading { color: var(--accent3); }

  /* progress */
  .progress-wrap { display: none; margin-top: 16px; }
  .progress-wrap.show { display: block; }
  .progress-bar-bg { background: var(--border); border-radius: 99px; height: 6px; overflow: hidden; }
  .progress-bar { background: linear-gradient(90deg, var(--accent), var(--accent2)); height: 100%; border-radius: 99px; transition: width .3s; width: 0%; }
  .progress-label { font-size: 0.78rem; color: var(--muted); margin-top: 6px; }

  /* summary */
  .summary {
    display: none;
    background: linear-gradient(135deg, rgba(124,58,237,.15), rgba(99,102,241,.1));
    border: 1px solid rgba(168,85,247,.3);
    border-radius: 14px;
    padding: 18px 22px;
    margin-bottom: 24px;
    gap: 28px;
    flex-wrap: wrap;
  }
  .summary.show { display: flex; align-items: center; }
  .summary-stat { text-align: center; }
  .summary-stat .num { font-size: 1.8rem; font-weight: 900; background: linear-gradient(90deg, #c084fc, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .summary-stat .label { font-size: 0.75rem; color: var(--muted); }

  /* video card */
  .video-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    margin-bottom: 18px;
    overflow: hidden;
    animation: fadeUp .3s ease both;
  }
  @keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:none; } }
  .video-header {
    display: flex; gap: 16px; padding: 18px;
    cursor: pointer; align-items: flex-start;
    transition: background .2s;
  }
  .video-header:hover { background: var(--card2); }
  .thumb { width: 140px; height: 80px; border-radius: 10px; object-fit: cover; flex-shrink: 0; background: var(--border); }
  .video-info { flex: 1; }
  .video-title { font-size: 0.97rem; font-weight: 700; line-height: 1.4; margin-bottom: 6px; }
  .video-meta { font-size: 0.78rem; color: var(--muted); display: flex; gap: 12px; flex-wrap: wrap; }
  .hit-badge {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff; border-radius: 20px; padding: 3px 12px;
    font-size: 0.78rem; font-weight: 700; white-space: nowrap;
    box-shadow: 0 2px 8px rgba(124,58,237,.4);
  }
  .toggle-btn {
    background: transparent; border: 1px solid var(--border);
    color: var(--accent3); border-radius: 8px;
    padding: 5px 12px; font-size: 0.8rem; cursor: pointer;
    transition: all .2s; white-space: nowrap; margin-top: 8px;
  }
  .toggle-btn:hover { background: rgba(168,85,247,.1); border-color: var(--accent2); }

  /* timeline */
  .timeline { display: none; border-top: 1px solid var(--border); padding: 14px 18px; }
  .timeline.open { display: block; }
  .tl-item {
    display: flex; gap: 12px; align-items: flex-start;
    padding: 10px 12px; border-radius: 10px;
    cursor: pointer; transition: background .15s;
    margin-bottom: 4px;
  }
  .tl-item:hover { background: var(--card2); }
  .ts {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff; border-radius: 7px; padding: 4px 10px;
    font-size: 0.8rem; font-weight: 700; white-space: nowrap;
    flex-shrink: 0; box-shadow: 0 2px 6px rgba(124,58,237,.35);
  }
  .tl-text { font-size: 0.88rem; line-height: 1.6; flex: 1; }
  .tl-text mark { background: var(--gold); color: #000; border-radius: 3px; padding: 0 2px; font-weight: 700; }
  .tl-hint { font-size: 0.72rem; color: var(--accent3); margin-top: 2px; opacity: .7; }

  /* player modal */
  .modal-bg {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,.85); z-index: 200;
    align-items: center; justify-content: center;
  }
  .modal-bg.show { display: flex; }
  .modal-inner { background: var(--card); border-radius: 16px; overflow: hidden; width: 90%; max-width: 820px; }
  .modal-top { display: flex; justify-content: space-between; align-items: center; padding: 14px 18px; border-bottom: 1px solid var(--border); }
  .modal-top h3 { font-size: 0.9rem; font-weight: 700; max-width: 80%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .close-btn { background: transparent; border: none; color: var(--muted); font-size: 1.4rem; cursor: pointer; }
  .player-wrap { position: relative; padding-bottom: 56.25%; }
  .player-wrap iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }

  /* empty */
  .empty { text-align: center; padding: 60px 16px; color: var(--muted); }
  .empty .icon { font-size: 3.5rem; margin-bottom: 14px; }
</style>
</head>
<body>

<header>
  <div class="logo">🧞‍♀️</div>
  <div class="logo-text">
    <h1>지니의 타임머신</h1>
    <p>유튜브 채널에서 키워드가 나오는 순간을 찾아드려요</p>
  </div>
</header>

<!-- Player Modal -->
<div class="modal-bg" id="modal">
  <div class="modal-inner">
    <div class="modal-top">
      <h3 id="modal-title"></h3>
      <button class="close-btn" onclick="closeModal()">✕</button>
    </div>
    <div class="player-wrap">
      <iframe id="modal-iframe" allowfullscreen allow="autoplay"></iframe>
    </div>
  </div>
</div>

<div class="wrap">
  <div class="search-card">
    <h2>🔍 채널 & 키워드 검색</h2>
    <div class="input-group">
      <input type="text" id="channelInput" placeholder="YouTube 채널 URL (예: https://www.youtube.com/@침착맨)" />
    </div>
    <div class="input-group">
      <input type="text" id="keywordInput" placeholder="검색할 키워드 (예: 라면, 병원, 여행)" onkeydown="if(event.key==='Enter')doSearch()" />
      <button class="btn" id="searchBtn" onclick="doSearch()">✨ 검색</button>
    </div>
    <div class="status" id="status"></div>
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar-bg"><div class="progress-bar" id="progressBar"></div></div>
      <div class="progress-label" id="progressLabel"></div>
    </div>
  </div>

  <div class="summary" id="summary">
    <div class="summary-stat"><div class="num" id="s-total">0</div><div class="label">분석한 영상</div></div>
    <div class="summary-stat"><div class="num" id="s-match">0</div><div class="label">키워드 발견</div></div>
    <div class="summary-stat"><div class="num" id="s-hits">0</div><div class="label">총 등장 횟수</div></div>
  </div>

  <div id="results"></div>
</div>

<script>
const API_BASE = 'https://zinitimeline-production.up.railway.app';

async function doSearch() {
  const channel = document.getElementById('channelInput').value.trim();
  const keyword = document.getElementById('keywordInput').value.trim();
  const btn     = document.getElementById('searchBtn');

  if (!channel || !keyword) {
    setStatus('채널 URL과 키워드를 모두 입력해주세요.', 'err'); return;
  }

  btn.disabled = true;
  setStatus('🧞‍♀️ 분석 중...', 'loading');
  document.getElementById('results').innerHTML = '';
  document.getElementById('summary').classList.remove('show');

  try {
    const url = `${API_BASE}/search?channel=${encodeURIComponent(channel)}&keyword=${encodeURIComponent(keyword)}`;
    console.log('요청 URL:', url);
    const res  = await fetch(url);
    const text = await res.text();
    console.log('응답 raw:', text);
    const data = JSON.parse(text);
    console.log('파싱 결과:', data);
    renderResults(data, keyword);
  } catch(e) {
    console.error('에러:', e);
    setStatus('❌ 오류: ' + e.message, 'err');
  }
  btn.disabled = false;
}

function renderResults(data, keyword) {
  const status = document.getElementById('status');
  const results = document.getElementById('results');

  // summary
  const totalHits = data.results.reduce((a, v) => a + v.hitCount, 0);
  document.getElementById('s-total').textContent = data.totalVideos;
  document.getElementById('s-match').textContent = data.matchedVideos;
  document.getElementById('s-hits').textContent  = totalHits;
  document.getElementById('summary').classList.add('show');

  if (data.matchedVideos === 0) {
    setStatus(`✅ ${data.totalVideos}개 영상 분석 완료`, 'ok');
    results.innerHTML = `<div class="empty"><div class="icon">🔍</div><p>"<strong>${keyword}</strong>" 키워드가 포함된 영상을 찾지 못했어요.<br>자막이 없는 영상은 검색되지 않을 수 있어요.</p></div>`;
    return;
  }

  setStatus(`✅ ${data.totalVideos}개 영상 분석 완료 — ${data.matchedVideos}개 영상에서 발견!`, 'ok');

  const kw = keyword;
  const re = new RegExp(`(${kw.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');

  results.innerHTML = data.results.map((v, vi) => `
    <div class="video-card" style="animation-delay:${vi*60}ms">
      <div class="video-header" onclick="toggleTimeline('tl-${vi}', this)">
        <img class="thumb" src="${v.thumbnail}" onerror="this.style.display='none'" />
        <div class="video-info">
          <div class="video-title">${v.title}</div>
          <div class="video-meta">
            <span>📅 ${v.published}</span>
            <span class="hit-badge">🎯 ${v.hitCount}번 등장</span>
          </div>
          <button class="toggle-btn">▼ 타임라인 보기</button>
        </div>
      </div>
      <div class="timeline" id="tl-${vi}">
        ${v.timeline.map(t => `
          <div class="tl-item" onclick="openPlayer('${v.videoId}', ${t.time}, '${v.title.replace(/'/g,"\\'")}')">
            <div><div class="ts">▶ ${t.timeStr}</div></div>
            <div>
              <div class="tl-text">${t.text.replace(re, '<mark>$1</mark>')}</div>
              <div class="tl-hint">클릭하면 이 시점부터 재생</div>
            </div>
          </div>`).join('')}
      </div>
    </div>`).join('');
}

function toggleTimeline(id, header) {
  const tl  = document.getElementById(id);
  const btn = header.querySelector('.toggle-btn');
  const open = tl.classList.toggle('open');
  btn.textContent = open ? '▲ 타임라인 닫기' : '▼ 타임라인 보기';
}

function openPlayer(videoId, seconds, title) {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-iframe').src = `https://www.youtube.com/embed/${videoId}?start=${seconds}&autoplay=1`;
  document.getElementById('modal').classList.add('show');
}

function closeModal() {
  document.getElementById('modal').classList.remove('show');
  document.getElementById('modal-iframe').src = '';
}

function setStatus(msg, type) {
  const el = document.getElementById('status');
  el.textContent = msg; el.className = 'status ' + type;
}

function showProgress(show, label = '', pct = 0) {
  const wrap = document.getElementById('progressWrap');
  wrap.classList.toggle('show', show);
  document.getElementById('progressBar').style.width = pct + '%';
  document.getElementById('progressLabel').textContent = label;
}

document.getElementById('modal').addEventListener('click', e => {
  if (e.target === document.getElementById('modal')) closeModal();
});
</script>
</body>
</html>
